name: Deploy to Prod Environment

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-pr-context:
    name: Get Pull Request Context
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      issues: read

    outputs:
      pr-title: ${{ steps.pr.outputs.pr-title }}
      pr-body: ${{ steps.pr.outputs.pr-body }}
      pr-labels: ${{ steps.pr.outputs.pr-labels }}

    steps:
      - name: Get Pull Request information
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          COMMIT_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/commits/$COMMIT_SHA")

          COMMIT_MESSAGE=$(echo "$COMMIT_DATA" | jq -r '.commit.message')

          echo "Commit message:"
          echo "$COMMIT_MESSAGE"

          PR_NUMBER=$(echo "$COMMIT_MESSAGE" | grep -oE 'Merge pull request #[0-9]+' | grep -oE '[0-9]+' | head -n 1)

          if [[ -z "$PR_NUMBER" ]]; then
            echo "ERROR: Unable to extract Pull Request number from merge commit message."
            echo "This workflow must be triggered by a Pull Request merge commit."
            exit 1
          fi

          echo "Pull Request number found: $PR_NUMBER"

          PR_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/pulls/$PR_NUMBER")

          ISSUE_DATA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/issues/$PR_NUMBER")

          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          PR_LABELS=$(echo "$ISSUE_DATA" | jq -c '.labels | map(.name)')

          echo "Pull Request title: $PR_TITLE"
          echo "Pull Request labels: $PR_LABELS"

          echo "pr-title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "pr-labels=$PR_LABELS" >> "$GITHUB_OUTPUT"

          {
            echo "pr-body<<EOF"
            echo "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release-checker:
    name: Release Checker
    runs-on: ubuntu-latest

    needs:
      - get-pr-context

    outputs:
      version: ${{ steps.release-checker.outputs.version }}
      release-title: ${{ steps.release-checker.outputs.release-title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check release information
        id: release-checker
        uses: ./.github/actions/release-checker
        with:
          pr-title: ${{ needs.get-pr-context.outputs.pr-title }}
          pr-labels: ${{ needs.get-pr-context.outputs.pr-labels }}

  quality-assurance:
    name: Quality Assurance
    runs-on: ubuntu-latest

    needs:
      - release-checker

    steps:
      - name: Run quality assurance
        run: |
          echo "Running quality assurance checks..."
          echo "Quality assurance completed successfully."

  tag-generator:
    name: Tag Generator
    runs-on: ubuntu-latest

    needs:
      - get-pr-context
      - release-checker
      - quality-assurance

    permissions:
      contents: write
      pull-requests: read
      issues: read

    steps:
      - name: Generate tag and release
        uses: ./.github/actions/tag-generator
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ needs.release-checker.outputs.version }}
          release-title: ${{ needs.release-checker.outputs.release-title }}
          release-notes: ${{ needs.get-pr-context.outputs.pr-body }}